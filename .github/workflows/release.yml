name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases / upload assets

jobs:
  build-and-release:
    name: Build dist + .deb + .rpm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc ruby ruby-dev rpm
          sudo gem install --no-document fpm

      - name: Build tarball + sha256
        run: make dist

      - name: Build .deb
        run: make deb

      - name: Build .rpm
        run: make rpm

      - name: Aggregate SHA256SUMS
        run: |
          cd dist
          sha256sum cc-harness-*.tar.gz cc-harness_*_*.deb cc-harness-*.rpm \
            > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cc-harness-*.tar.gz
            dist/cc-harness-*.tar.gz.sha256
            dist/cc-harness_*_*.deb
            dist/cc-harness-*.rpm
            dist/SHA256SUMS
